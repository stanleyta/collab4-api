name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [go-collab4, go-langchaingo]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'

    - name: Verify dependencies
      run: go mod verify
      working-directory: ${{ matrix.module }}

    - name: Check formatting
      run: |
        if [ "$(gofmt -l .)" ]; then
          echo "The following files are not formatted:"
          gofmt -l .
          exit 1
        fi
      working-directory: ${{ matrix.module }}

    - name: Vet
      run: go vet ./...
      working-directory: ${{ matrix.module }}

    - name: Test
      run: go test -v ./...
      working-directory: ${{ matrix.module }}

    - name: Build
      run: go build -v ./...
      working-directory: ${{ matrix.module }}
